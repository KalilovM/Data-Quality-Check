services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: dq_monitor
      POSTGRES_USER: dq_user
      POSTGRES_PASSWORD: dq_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://dq_user:dq_password@postgres:5432/dq_monitor
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  postgres_data:
